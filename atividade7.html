<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 7</title>
</head>
<body>
    <h1>Atividade JavaScript</h1>

    <h2>1. Botão de Mensagem</h2>
    <button id="btnMensagem">Clique aqui</button>
    <p id="mensagem"></p>
    <hr>

    <h2>2. Lista de Tarefas</h2>
    <input type="text" id="tarefa" placeholder="Digite uma tarefa">
    <button id="addTarefa">Adicionar</button>
    <ul id="listaTarefas"></ul>
    <hr>

    <h2>3. Nome do Aluno</h2>
    <input type="text" id="nomeAluno" placeholder="Digite o nome">
    <button id="mostrarNome">Mostrar</button>
    <p id="nomeExibido"></p>
    <hr>

    <h2>4. Formulário com Validação</h2>
    <form id="formulario">
        <input type="text" id="campoNome" placeholder="Digite seu nome">
        <span id="erroNome" style="color:red;font-size:12px;"></span><br>
        <button type="submit">Enviar</button>
    </form>
    <hr>

    <h2>5. Lista de Avisos</h2>
    <input type="text" id="aviso" placeholder="Digite o aviso">
    <button id="addAviso">Adicionar</button>
    <ul id="listaAvisos"></ul>
    <p id="contadorAvisos"></p>

    <script>

        document.querySelector('#btnMensagem').addEventListener('click', () => {
            document.querySelector('#mensagem').textContent = 'Olá! Você clicou! 🎉';
        });

        document.querySelector('#addTarefa').addEventListener('click', () => {
            const input = document.querySelector('#tarefa');
            const texto = input.value.trim();
            
            if (texto === '') {
                alert('Digite uma tarefa!');
                return;
            }

            const li = document.createElement('li');
            li.textContent = texto;
       
            const btnRemover = document.createElement('button');
            btnRemover.textContent = '❌';
            btnRemover.onclick = () => li.remove();
            li.appendChild(btnRemover);
            
            document.querySelector('#listaTarefas').appendChild(li);
            input.value = '';
            input.focus();
        });

        document.querySelector('#mostrarNome').addEventListener('click', () => {
            const nome = document.querySelector('#nomeAluno').value.trim();
            const p = document.querySelector('#nomeExibido');
            
            if (nome === '') {
                p.textContent = 'Digite um nome!';
                p.style.color = 'red';
            } else {
                p.textContent = `Aluno: ${nome}`;
                p.style.color = 'blue';
            }
        });

        document.querySelector('#formulario').addEventListener('submit', (e) => {
            const nome = document.querySelector('#campoNome').value.trim();
            const erro = document.querySelector('#erroNome');
            
            if (nome === '') {
                erro.textContent = 'Nome é obrigatório!';
                e.preventDefault();
            } else {
                erro.textContent = '';
                alert('Formulário enviado!');
            }
        });

        document.querySelector('#campoNome').addEventListener('input', () => {
            document.querySelector('#erroNome').textContent = '';
        });

        function atualizarContador() {
            const total = document.querySelector('#listaAvisos').children.length;
            document.querySelector('#contadorAvisos').textContent = `Total: ${total} aviso(s)`;
        }

        document.querySelector('#addAviso').addEventListener('click', () => {
            const input = document.querySelector('#aviso');
            const texto = input.value.trim();
            
            if (texto === '') {
                alert('Digite um aviso!');
                return;
            }

            const li = document.createElement('li');
            li.textContent = texto;

            const btnRemover = document.createElement('button');
            btnRemover.textContent = '✖';
            btnRemover.onclick = () => {
                li.remove();
                atualizarContador();
            };
            li.appendChild(btnRemover);
            
            document.querySelector('#listaAvisos').appendChild(li);
            input.value = '';
            input.focus();
            atualizarContador();
        });

        document.querySelector('#aviso').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.querySelector('#addAviso').click();
        });

    </script>
</body>
</html>
